# POC — builds installable mobile app artifacts (debug APK + unsigned iOS app)
# from the Capacitor shell in mobile/.
# See docs/ai/spec-driven-development/specs/2026-07-10-feat-mobile-app-poc.md.
name: Mobile Apps Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-build.yml'

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Build web app
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # Bake the audit environment into the bundled assets so the native
          # login bridge opens `https://audit.oisy.com/mobile-auth` (OISY_URL =
          # VITE_OISY_DOMAIN, resolved from this network). Without a network the
          # build would default to `local` and point login at localhost.
          DFX_NETWORK: audit
          # Client-side provider keys, baked into the bundle like any frontend
          # deploy. Dedicated *_MOBILE secrets (temporary, independently
          # revocable) take precedence; until they exist, fall back to the same
          # keys the audit web deploy ships (already public in that bundle).
          # NOTE: artifacts on this public repo are downloadable by anyone —
          # these keys are public by design; never reuse a privileged key here.
          VITE_COINGECKO_API_KEY: ${{ secrets.VITE_COINGECKO_API_KEY_MOBILE || secrets.VITE_COINGECKO_API_KEY_STAGING }}
          VITE_ETHERSCAN_API_KEY: ${{ secrets.VITE_ETHERSCAN_API_KEY_MOBILE || secrets.VITE_ETHERSCAN_API_KEY_STAGING }}
          VITE_ALCHEMY_API_KEY: ${{ secrets.VITE_ALCHEMY_API_KEY_MOBILE || secrets.VITE_ALCHEMY_API_KEY_TEST_FE }}
          VITE_INFURA_API_KEY: ${{ secrets.VITE_INFURA_API_KEY_MOBILE || secrets.VITE_INFURA_API_KEY_STAGING }}
          VITE_QUICKNODE_API_KEY: ${{ secrets.VITE_QUICKNODE_API_KEY_MOBILE || secrets.VITE_QUICKNODE_API_KEY_STAGING }}
          # QuickNode tokens are bound to their endpoint subdomain: when the
          # mobile token is used, its endpoint hosts must be injected too
          # (empty when unset -> code falls back to the default hosts).
          VITE_QUICKNODE_API_URL_MAINNET: ${{ secrets.VITE_QUICKNODE_API_URL_MAINNET_MOBILE }}
          VITE_QUICKNODE_API_URL_DEVNET: ${{ secrets.VITE_QUICKNODE_API_URL_DEVNET_MOBILE }}
          VITE_WALLET_CONNECT_PROJECT_ID: ${{ secrets.VITE_WALLET_CONNECT_PROJECT_ID_MOBILE || secrets.VITE_WALLET_CONNECT_PROJECT_ID_STAGING }}
          VITE_ONRAMPER_API_KEY_DEV: ${{ secrets.VITE_ONRAMPER_API_KEY_DEV_MOBILE || secrets.VITE_ONRAMPER_API_KEY_DEV_STAGING }}
          VITE_ONRAMPER_API_KEY_PROD: ${{ secrets.VITE_ONRAMPER_API_KEY_PROD_MOBILE || secrets.VITE_ONRAMPER_API_KEY_PROD_STAGING }}

      # The post-process step emits .gz siblings for the IC asset canister;
      # Android's asset merger treats foo and foo.gz as duplicate resources,
      # and the WebView never serves the .gz variants anyway.
      - name: Strip precompressed assets
        run: find build -name '*.gz' -delete

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 21

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oisy-wallet-android-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      # The heap bump avoids v8 OOM aborts on the memory-constrained macOS runners.
      - name: Build web app
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # Bake the audit environment into the bundled assets so the native
          # login bridge opens `https://audit.oisy.com/mobile-auth` (OISY_URL =
          # VITE_OISY_DOMAIN, resolved from this network). Without a network the
          # build would default to `local` and point login at localhost.
          DFX_NETWORK: audit
          # Client-side provider keys, baked into the bundle like any frontend
          # deploy. Dedicated *_MOBILE secrets (temporary, independently
          # revocable) take precedence; until they exist, fall back to the same
          # keys the audit web deploy ships (already public in that bundle).
          # NOTE: artifacts on this public repo are downloadable by anyone —
          # these keys are public by design; never reuse a privileged key here.
          VITE_COINGECKO_API_KEY: ${{ secrets.VITE_COINGECKO_API_KEY_MOBILE || secrets.VITE_COINGECKO_API_KEY_STAGING }}
          VITE_ETHERSCAN_API_KEY: ${{ secrets.VITE_ETHERSCAN_API_KEY_MOBILE || secrets.VITE_ETHERSCAN_API_KEY_STAGING }}
          VITE_ALCHEMY_API_KEY: ${{ secrets.VITE_ALCHEMY_API_KEY_MOBILE || secrets.VITE_ALCHEMY_API_KEY_TEST_FE }}
          VITE_INFURA_API_KEY: ${{ secrets.VITE_INFURA_API_KEY_MOBILE || secrets.VITE_INFURA_API_KEY_STAGING }}
          VITE_QUICKNODE_API_KEY: ${{ secrets.VITE_QUICKNODE_API_KEY_MOBILE || secrets.VITE_QUICKNODE_API_KEY_STAGING }}
          # QuickNode tokens are bound to their endpoint subdomain: when the
          # mobile token is used, its endpoint hosts must be injected too
          # (empty when unset -> code falls back to the default hosts).
          VITE_QUICKNODE_API_URL_MAINNET: ${{ secrets.VITE_QUICKNODE_API_URL_MAINNET_MOBILE }}
          VITE_QUICKNODE_API_URL_DEVNET: ${{ secrets.VITE_QUICKNODE_API_URL_DEVNET_MOBILE }}
          VITE_WALLET_CONNECT_PROJECT_ID: ${{ secrets.VITE_WALLET_CONNECT_PROJECT_ID_MOBILE || secrets.VITE_WALLET_CONNECT_PROJECT_ID_STAGING }}
          VITE_ONRAMPER_API_KEY_DEV: ${{ secrets.VITE_ONRAMPER_API_KEY_DEV_MOBILE || secrets.VITE_ONRAMPER_API_KEY_DEV_STAGING }}
          VITE_ONRAMPER_API_KEY_PROD: ${{ secrets.VITE_ONRAMPER_API_KEY_PROD_MOBILE || secrets.VITE_ONRAMPER_API_KEY_PROD_STAGING }}

      - name: Strip precompressed assets
        run: find build -name '*.gz' -delete

      - name: Sync Capacitor iOS project
        working-directory: mobile
        run: npx cap sync ios

      # POC: unsigned simulator build — proves the project compiles and yields
      # an installable .app for the iOS simulator. Device .ipa distribution
      # requires Apple signing certificates (out of scope, see spec).
      - name: Build iOS app (simulator, unsigned)
        working-directory: mobile/ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Package iOS app artifact
        working-directory: mobile/ios/App
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -qry App-simulator.zip App.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oisy-wallet-ios-simulator-debug
          path: mobile/ios/App/build/Build/Products/Debug-iphonesimulator/App-simulator.zip
          if-no-files-found: error
