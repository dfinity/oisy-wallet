<!doctype html>
<html lang="en">
	<head>
		<script theme-loader>
			try {
				const isDarkPreferred = window.matchMedia('(prefers-color-scheme: dark)').matches;

				const currentTheme =
					localStorage.nnsTheme === null ||
					localStorage.nnsTheme === undefined ||
					localStorage.nnsTheme === ''
						? undefined
						: JSON.parse(localStorage.nnsTheme);

				document.documentElement.setAttribute(
					'theme',
					currentTheme ?? (isDarkPreferred ? 'dark' : 'light')
				);
			} catch (error) {
				console.error('Error initializing theme', error);
			}
		</script>

		<script language-loader>
			try {
				const currentLanguage =
					localStorage.lang === null || localStorage.lang === undefined || localStorage.lang === ''
						? undefined
						: JSON.parse(localStorage.lang);

				document.documentElement.setAttribute('lang', currentLanguage ?? 'en');
			} catch (error) {
				console.error('Error initializing language', error);
			}
		</script>

		<style>
			:root {
				&,
				#app-background-container {
					background: #e8f1ff;
				}
				color: #000;
			}
			:root[theme='dark'] {
				&,
				#app-background-container {
					background: #070f1c;
				}
				color: #f4f6fa;
			}
		</style>

		<meta charset="utf-8" />
		<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport" />

		<title>OISY AI</title>
		<meta content="OISY AI — Your intelligent crypto assistant" name="description" />
		<meta content="OISY AI" property="og:title" />
		<meta content="OISY AI — Your intelligent crypto assistant" property="og:description" />
		<meta content="website" property="og:type" />
		<meta content="https://oisy.ai" property="og:url" />

		<link crossorigin="anonymous" href="/manifest.webmanifest" rel="manifest" />

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/favicons/favicon-32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="%sveltekit.assets%/favicons/favicon-16x16.png"
		/>
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />

		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="#016DFC" />
		<meta name="apple-mobile-web-app-title" content="OISY AI" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicons/apple-touch-icon.png" />

		<meta name="msapplication-TileColor" content="#016DFC" />
		<meta content="#FFFFFF" name="theme-color" />
		%sveltekit.head%

		<style>
			#app-spinner {
				--spinner-size: 30px;

				width: 30px;
				height: 30px;
				border: 3px solid rgb(0, 102, 255);
				border-top-color: transparent;
				border-radius: 50%;
				animation: spin 0.75s ease-in-out 40;
				position: absolute;
				top: 50%;
				left: 50%;
				transform: rotate(0deg);
				margin-left: -15px;
				margin-top: -15px;
				box-sizing: border-box;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			#app-background-container {
				contain: paint;
				pointer-events: none;

				position: fixed;
				top: 0;
				left: 50%;

				transform: translateX(-50%);

				width: 100%;
				height: 100%;

				z-index: -1;

				overflow: hidden;
			}

			#app-background-light,
			#app-background-dark {
				contain: paint;
				pointer-events: none;

				width: 100%;
				min-width: 1728px;
			}

			:root[theme='light'] {
				#app-background-light {
					display: block;
				}

				#app-background-dark {
					display: none;
				}
			}

			:root[theme='dark'] {
				#app-background-light {
					display: none;
				}

				#app-background-dark {
					display: block;
				}
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-background-container">
			<img
				id="app-background-light"
				src="/images/oisy_bg_light.webp"
				alt="OISY Background light theme"
			/>
			<img
				id="app-background-dark"
				src="/images/oisy_bg_dark.webp"
				alt="OISY Background dark theme"
			/>
		</div>

		<div style="display: contents">%sveltekit.body%</div>

		<div id="app-spinner" aria-hidden="true" data-tid="spinner"></div>
	</body>
</html>
